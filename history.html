<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sales History | SPORTS WORLD</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root {
      --bg: #080a0c;
      --card: rgba(17, 25, 40, 0.75);
      --cyan: #00f3ff;
      --text: #e0e6ed;
      --border: rgba(255, 255, 255, 0.1);
      --red: #ff4d4d;
    }

    /* Stealth Mode Styles */
    body.stealth-mode {
      --cyan: #666;
      --bg: #000;
      --card: #0a0a0a;
      background-image: none !important;
      filter: grayscale(1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      background-image: radial-gradient(circle at 50% 100%, rgba(0, 243, 255, 0.05) 0%, transparent 50%);
      color: var(--text);
      padding: 20px;
      transition: 0.3s;
    }

    .container { max-width: 1000px; margin: 0 auto; }

    .panel {
      background: var(--card);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      padding: 20px;
      border-radius: 15px;
      margin-bottom: 20px;
    }

    .stealth-btn {
      position: fixed;
      top: 15px;
      right: 15px;
      cursor: pointer;
      background: var(--card);
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.8rem;
    }

    /* Daily Log Cards */
    .day-group {
      margin-bottom: 20px;
      padding: 15px;
      background: rgba(255, 255, 255, 0.02);
      border-radius: 12px;
      border-left: 4px solid var(--cyan);
    }

    .bill-row {
      display: flex;
      justify-content: space-between;
      padding: 12px;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 8px;
      cursor: pointer;
    }

    .bill-row:hover {
      border-color: var(--cyan);
      background: rgba(0, 243, 255, 0.1);
    }

    /* Popup View */
    .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); z-index: 1000; }
    .popup { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 1001; width: 500px; border: 1px solid var(--cyan); }

    input { width: 100%; padding: 12px; margin-bottom: 15px; background: rgba(0,0,0,0.4); border: 1px solid var(--border); border-radius: 8px; color: white; }
    button { padding: 10px 20px; background: var(--cyan); border: none; border-radius: 8px; color: black; font-weight: bold; cursor: pointer; }

    .nav { text-align: center; margin-top: 30px; }
    .nav a { color: #888; text-decoration: none; margin: 0 10px; font-size: 0.9rem; }
  </style>
</head>
<body>

  <div class="stealth-btn" onclick="toggleStealth()">
    <i data-lucide="eye-off"></i> STEALTH MODE
  </div>

  <div class="container">
    <h1 style="text-align: center; font-family: 'Orbitron'; color: var(--cyan); margin-bottom: 30px;">SALES ARCHIVES</h1>

    <div id="auth-box" class="panel" style="max-width: 400px; margin: 50px auto; text-align: center;">
      <h3 style="margin-bottom: 15px; font-family: 'Orbitron';">ADMIN ACCESS</h3>
      <input id="history-pass" type="password" placeholder="Enter Key">
      <button onclick="checkAccess()">VIEW RECORDS</button>
    </div>

    <div id="history-content" style="display: none;">
      <div class="panel">
        <div style="display: flex; gap: 15px; align-items: center;">
          <span style="font-size: 0.9rem; color: #888;">Filter by Date:</span>
          <input type="date" id="date-filter" style="margin:0; flex: 1;" onchange="filterData()">
          <button onclick="resetView()" style="background: #333; color: white;">Clear</button>
        </div>
      </div>

      <div id="log-container"></div>
    </div>
  </div>

  <div class="overlay" id="overlay" onclick="closeDetails()"></div>
  <div id="details-popup" class="panel popup">
    </div>

  <div class="nav">
    <a href="/index.html">Billing</a>
    <a href="/add-item.html">Inventory</a>
    <a href="/view-bill.html">Find Bill</a>
  </div>

  <script>
    lucide.createIcons();
    const adminKey = "gourab009";

    function toggleStealth() {
      document.body.classList.toggle('stealth-mode');
    }

    function checkAccess() {
      if(document.getElementById('history-pass').value === adminKey) {
        document.getElementById('auth-box').style.display = 'none';
        document.getElementById('history-content').style.display = 'block';
        fetchHistory();
      } else {
        alert("WRONG KEY");
      }
    }

    async function fetchHistory() {
      const res = await fetch('/bills');
      const bills = await res.json();
      renderHistory(bills);
    }

    function renderHistory(bills) {
      const container = document.getElementById('log-container');
      container.innerHTML = '';

      // Group bills by date
      const grouped = bills.reduce((acc, bill) => {
        const date = new Date(bill.date).toLocaleDateString('en-GB');
        if (!acc[date]) acc[date] = { bills: [], total: 0 };
        
        const subtotal = bill.items.reduce((s, i) => s + (i.price * (i.qty - (i.returnedQty || 0))), 0);
        acc[date].bills.push(bill);
        acc[date].total += (subtotal - (bill.discount || 0));
        return acc;
      }, {});

      Object.entries(grouped).forEach(([date, data]) => {
        const groupDiv = document.createElement('div');
        groupDiv.className = 'day-group';
        groupDiv.innerHTML = `
          <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
            <h3 style="font-family:Orbitron; font-size:0.9rem;">${date}</h3>
            <span style="color:var(--cyan); font-weight:bold;">Total: ₹${data.total}</span>
          </div>
          ${data.bills.map(b => {
            const bTotal = b.items.reduce((s, i) => s + (i.price * (i.qty - (i.returnedQty || 0))), 0) - (b.discount || 0);
            return `
              <div class="bill-row" onclick='showBillDetails(${JSON.stringify(b)})'>
                <span>#${b.serialNumber}</span>
                <span style="color:#888;">${b.customer || "Guest"}</span>
                <span style="color:#00ffcc;">₹${bTotal}</span>
              </div>`;
          }).join('')}
        `;
        container.appendChild(groupDiv);
      });
    }

    function showBillDetails(bill) {
      const popup = document.getElementById('details-popup');
      const subtotal = bill.items.reduce((s, i) => s + (i.price * (i.qty - (i.returnedQty || 0))), 0);
      
      document.getElementById('overlay').style.display = 'block';
      popup.style.display = 'block';
      
      popup.innerHTML = `
        <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
          <h3 style="font-family:Orbitron; color:var(--cyan); font-size:0.9rem;">BILL #${bill.serialNumber}</h3>
          <button onclick="closeDetails()" style="padding: 2px 8px; background: red; color: white;">X</button>
        </div>
        <p style="font-size:0.8rem; color:#888; margin-bottom:10px;">Customer: ${bill.customer || 'N/A'} | Phone: ${bill.phone || 'N/A'}</p>
        <div style="max-height:200px; overflow-y:auto; border-bottom:1px solid var(--border);">
          ${bill.items.map(i => `
            <div style="display:flex; justify-content:space-between; font-size:0.85rem; padding:5px 0;">
              <span>${i.name} (x${i.qty - (i.returnedQty || 0)})</span>
              <span>₹${i.price * (i.qty - (i.returnedQty || 0))}</span>
            </div>
          `).join('')}
        </div>
        <div style="margin-top:10px; text-align:right;">
          <p style="font-size:0.8rem; color:#888;">Subtotal: ₹${subtotal}</p>
          <p style="font-size:0.8rem; color:var(--red);">Discount: -₹${bill.discount || 0}</p>
          <p style="font-family:Orbitron; color:var(--cyan); font-size:1.1rem; margin-top:5px;">Grand Total: ₹${subtotal - (bill.discount || 0)}</p>
        </div>
      `;
    }

    function closeDetails() {
      document.getElementById('overlay').style.display = 'none';
      document.getElementById('details-popup').style.display = 'none';
    }

    function filterData() {
      const val = document.getElementById('date-filter').value;
      if (!val) return fetchHistory();
      const selected = new Date(val).toLocaleDateString('en-GB');
      const groups = document.querySelectorAll('.day-group');
      groups.forEach(g => {
        const d = g.querySelector('h3').textContent;
        g.style.display = d === selected ? 'block' : 'none';
      });
    }

    function resetView() {
      document.getElementById('date-filter').value = '';
      fetchHistory();
    }
  </script>
</body>
</html>
