<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>View Bill | SPORTS WORLD</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root {
      --bg: #080a0c;
      --card: rgba(17, 25, 40, 0.75);
      --cyan: #00f3ff;
      --text: #e0e6ed;
      --border: rgba(255, 255, 255, 0.1);
      --red: #ff4d4d;
      --green: #00ffcc;
    }

    body.stealth-mode {
      --cyan: #666;
      --bg: #000;
      --card: #0a0a0a;
      filter: grayscale(1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      background-image: radial-gradient(circle at 50% 0%, rgba(0, 243, 255, 0.05) 0%, transparent 50%);
      color: var(--text);
      padding: 20px;
      transition: 0.3s;
    }

    .container { max-width: 700px; margin: 0 auto; }

    .panel {
      background: var(--card);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      padding: 25px;
      border-radius: 15px;
      margin-bottom: 20px;
    }

    .stealth-btn {
      position: fixed;
      top: 15px;
      right: 15px;
      cursor: pointer;
      background: var(--card);
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.8rem;
    }

    input {
      width: 100%;
      padding: 12px;
      background: rgba(0,0,0,0.4);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: white;
      text-align: center;
      letter-spacing: 2px;
      margin-bottom: 15px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: var(--cyan);
      border: none;
      border-radius: 8px;
      color: black;
      font-weight: bold;
      font-family: 'Orbitron', sans-serif;
      cursor: pointer;
    }

    /* Bill Display UI */
    .bill-header {
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      padding-bottom: 15px;
      margin-bottom: 20px;
    }

    .status-badge {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: bold;
      text-transform: uppercase;
    }

    .status-active { background: rgba(0, 255, 204, 0.1); color: var(--green); border: 1px solid var(--green); }
    .status-returned { background: rgba(255, 77, 77, 0.1); color: var(--red); border: 1px solid var(--red); }

    .item-box {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 15px;
      margin-bottom: 10px;
    }

    .return-action {
      display: flex;
      gap: 10px;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px dotted #444;
    }

    .nav { text-align: center; margin-top: 30px; }
    .nav a { color: #888; text-decoration: none; margin: 0 10px; font-size: 0.9rem; }
  </style>
</head>
<body>

  <div class="stealth-btn" onclick="toggleStealth()">
    <i data-lucide="eye-off"></i> STEALTH MODE
  </div>

  <div class="container">
    <h1 style="text-align: center; font-family: 'Orbitron'; color: var(--cyan); margin-bottom: 25px;">BILL TRACKER</h1>

    <div class="panel">
      <input id="serial-input" placeholder="ENTER 10-DIGIT SERIAL" maxlength="10">
      <button onclick="fetchBill()">SEARCH ARCHIVES</button>
    </div>

    <div id="bill-result" style="display: none;">
      <div class="panel" id="bill-content">
        </div>
    </div>
  </div>

  <div class="nav">
    <a href="/index.html">Billing</a>
    <a href="/add-item.html">Inventory</a>
    <a href="/history.html">History</a>
  </div>

  <script>
    lucide.createIcons();
    let currentBill = null;

    function toggleStealth() {
      document.body.classList.toggle('stealth-mode');
    }

    async function fetchBill() {
      const serial = document.getElementById("serial-input").value;
      if (serial.length !== 10) return alert("Please enter a 10-digit serial number.");

      try {
        const res = await fetch(`/bill/${serial}`);
        const bill = await res.json();
        
        if (!bill) return alert("Bill not found.");

        currentBill = bill;
        const resultDiv = document.getElementById("bill-result");
        const content = document.getElementById("bill-content");
        resultDiv.style.display = 'block';
        
        // Original logic: Calculate subtotal from remaining items
        const subtotal = bill.items.reduce((sum, item) => sum + (item.price * (item.qty - (item.returnedQty || 0))), 0);
        const discount = bill.discount || 0;

        content.innerHTML = `
          <div class="bill-header">
            <div>
              <p style="color:var(--cyan); font-family:Orbitron; font-size:0.8rem;">SERIAL: #${bill.serialNumber}</p>
              <h2 style="margin:5px 0;">${bill.customer || "Guest"}</h2>
              <p style="color:#888; font-size:0.75rem;">Phone: ${bill.phone || "N/A"} | ${new Date(bill.date).toLocaleString()}</p>
            </div>
            <div class="status-badge ${bill.returned ? "status-returned" : "status-active"}">
              ${bill.returned ? "Returned" : "Active"}
            </div>
          </div>

          <div class="items-list">
            ${bill.items.map((item, index) => {
              const remainingQty = item.qty - (item.returnedQty || 0);
              return `
                <div class="item-box">
                  <div style="display:flex; justify-content:space-between;">
                    <span><strong>${item.name}</strong></span>
                    <span style="color:var(--cyan);">₹${item.price * remainingQty}</span>
                  </div>
                  <p style="font-size:0.75rem; color:#888;">Qty: ${remainingQty} | Price: ₹${item.price}</p>
                  
                  ${remainingQty > 0 ? `
                    <div class="return-action">
                      <input type="number" id="ret-qty-${index}" min="1" max="${remainingQty}" value="1" 
                             style="width:60px; margin:0; padding:5px; font-size:0.8rem;">
                      <button onclick="processReturn(${index})" style="padding:5px; font-size:0.7rem; background:var(--red); color:white;">RETURN ITEM</button>
                    </div>
                  ` : '<p style="color:var(--red); font-size:0.7rem; margin-top:10px;">Item fully returned</p>'}
                </div>
              `;
            }).join("")}
          </div>

          <div style="margin-top:20px; border-top:2px solid var(--cyan); padding-top:15px; text-align:right;">
            <p style="color:#888; font-size:0.8rem;">Subtotal: ₹${subtotal + discount}</p>
            <p style="color:var(--red); font-size:0.8rem;">Discount: -₹${discount}</p>
            <h2 style="color:var(--cyan); font-family:Orbitron; margin-top:5px;">TOTAL: ₹${subtotal}</h2>
          </div>
        `;
        lucide.createIcons();
      } catch (e) {
        alert("Server error.");
      }
    }

    // Original Return Logic Restored
    async function processReturn(itemIndex) {
      const returnQty = Number(document.getElementById(`ret-qty-${itemIndex}`).value);
      
      try {
        const res = await fetch(`/bill/${currentBill.serialNumber}/return`, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ itemIndex, returnQty }),
        });
        if (!res.ok) throw new Error("Return failed");
        alert("Stock restored and bill updated.");
        fetchBill(); // Refresh view
      } catch (e) {
        alert(e.message);
      }
    }
  </script>
</body>
</html>
