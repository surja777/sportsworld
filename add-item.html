<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory | SPORTS WORLD</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #080a0c;
            --cyan: #00f3ff;
            --card: rgba(17, 25, 40, 0.75);
            --text: #e0e6ed;
            --border: rgba(255, 255, 255, 0.1);
            --red: #ff4d4d;
        }

        /* Feature 6: Stealth Mode Styles */
        body.stealth-mode {
            --cyan: #666;
            --bg: #000;
            --card: #0a0a0a;
            background-image: none !important;
            filter: grayscale(1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            background-image: linear-gradient(rgba(0, 243, 255, 0.03) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(0, 243, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            color: var(--text);
            padding: 20px;
            transition: 0.3s;
        }

        .container { max-width: 900px; margin: 0 auto; }

        .panel {
            background: var(--card);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        /* Feature 1: Low Stock Glow Alert */
        @keyframes pulse-red {
            0% { box-shadow: 0 0 5px rgba(255, 77, 77, 0.2); border: 1px solid var(--red); }
            50% { box-shadow: 0 0 15px rgba(255, 77, 77, 0.5); border: 1px solid #ff0000; }
            100% { box-shadow: 0 0 5px rgba(255, 77, 77, 0.2); border: 1px solid var(--red); }
        }

        .low-stock-row {
            animation: pulse-red 2s infinite;
            background: rgba(255, 77, 77, 0.05) !important;
        }

        .stealth-btn {
            position: fixed;
            top: 15px;
            right: 15px;
            cursor: pointer;
            background: var(--card);
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.8rem;
            z-index: 100;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: white;
        }

        button {
            padding: 12px 20px;
            background: var(--cyan);
            border: none;
            border-radius: 8px;
            color: black;
            font-weight: bold;
            font-family: 'Orbitron', sans-serif;
            cursor: pointer;
        }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); }

        /* Popup Styles Restored */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; }
        .popup { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 1001; width: 400px; }

        .nav { text-align: center; margin-top: 20px; }
        .nav a { color: #888; text-decoration: none; margin: 0 10px; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="stealth-btn" onclick="toggleStealth()">
        <i data-lucide="eye-off"></i> STEALTH MODE
    </div>

    <div class="container">
        <h1 style="text-align: center; font-family: 'Orbitron'; color: var(--cyan); margin-bottom: 25px;">INVENTORY CONTROL</h1>

        <div id="auth-box" class="panel" style="max-width: 400px; margin: 50px auto; text-align: center;">
            <h3 style="margin-bottom: 15px; font-family: 'Orbitron';">ACCESS REQUIRED</h3>
            <input id="admin-pass" type="password" placeholder="Enter Security Key">
            <button onclick="checkAccess()">UNLOCK TERMINAL</button>
        </div>

        <div id="inventory-main" style="display: none;">
            <div class="panel">
                <div style="display: grid; grid-template-columns: 2fr 1fr 1fr auto; gap: 10px;">
                    <input id="new-name" placeholder="Gear Name">
                    <input id="new-price" type="number" placeholder="Price (₹)">
                    <input id="new-stock" type="number" placeholder="Stock Qty">
                    <button onclick="addNewItem()">INJECT</button>
                </div>
            </div>

            <div class="panel">
                <input id="search-box" placeholder="Search inventory..." oninput="filterTable()">
                <table id="item-table">
                    <thead>
                        <tr><th>Name</th><th>Price</th><th>Stock</th><th>Action</th></tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="overlay" id="overlay"></div>
    <div class="popup panel" id="edit-popup">
        <h3 style="margin-bottom: 15px; color: var(--cyan); font-family: 'Orbitron';">CALIBRATE GEAR</h3>
        <input id="edit-name" placeholder="Name">
        <input id="edit-price" type="number" placeholder="Price">
        <input id="edit-stock" type="number" placeholder="Stock">
        <div style="display: flex; gap: 10px;">
            <button onclick="saveEdit()" style="flex: 1;">SAVE</button>
            <button onclick="closeEdit()" style="flex: 1; background: var(--red);">CANCEL</button>
        </div>
    </div>

    <div class="nav">
        <a href="/index.html">Billing</a>
        <a href="/view-bill.html">Find Bill</a>
        <a href="/history.html">Archives</a>
    </div>

    <script>
        lucide.createIcons();
        let allItems = [];
        let editingId = null;

        function toggleStealth() {
            document.body.classList.toggle('stealth-mode');
        }

        // Original Password Logic Restored
        function checkAccess() {
            if(document.getElementById('admin-pass').value === "gourab009") {
                document.getElementById('auth-box').style.display = 'none';
                document.getElementById('inventory-main').style.display = 'block';
                loadInventory();
            } else {
                alert("ACCESS DENIED");
            }
        }

        async function loadInventory() {
            const res = await fetch('/items');
            allItems = await res.json();
            renderTable(allItems);
        }

        function renderTable(data) {
            const tbody = document.querySelector('#item-table tbody');
            tbody.innerHTML = '';
            data.forEach(item => {
                const tr = document.createElement('tr');
                // Feature 1: Low Stock Alert
                if(item.stock < 5) tr.className = 'low-stock-row';

                tr.innerHTML = `
                    <td>${item.name}</td>
                    <td>₹${item.price}</td>
                    <td>${item.stock} pieces</td>
                    <td>
                        <button onclick="openEdit('${item._id}', '${item.name}', ${item.price}, ${item.stock})" style="padding: 5px 10px; font-size: 0.7rem; background: orange;">Edit</button>
                        <button onclick="deleteItem('${item._id}')" style="padding: 5px 10px; font-size: 0.7rem; background: var(--red);">Del</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function filterTable() {
            const query = document.getElementById('search-box').value.toLowerCase();
            const filtered = allItems.filter(i => i.name.toLowerCase().includes(query));
            renderTable(filtered);
        }

        async function addNewItem() {
            const item = {
                name: document.getElementById('new-name').value,
                price: Number(document.getElementById('new-price').value),
                stock: Number(document.getElementById('new-stock').value)
            };
            if(!item.name || !item.price) return alert("Fill Name and Price!");

            await fetch('/items', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(item)
            });
            document.getElementById('new-name').value = '';
            document.getElementById('new-price').value = '';
            document.getElementById('new-stock').value = '';
            loadInventory();
        }

        // Edit Feature Logic Restored
        function openEdit(id, name, price, stock) {
            editingId = id;
            document.getElementById('edit-name').value = name;
            document.getElementById('edit-price').value = price;
            document.getElementById('edit-stock').value = stock;
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('edit-popup').style.display = 'block';
        }

        function closeEdit() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('edit-popup').style.display = 'none';
        }

        async function saveEdit() {
            const update = {
                name: document.getElementById('edit-name').value,
                price: Number(document.getElementById('edit-price').value),
                stock: Number(document.getElementById('edit-stock').value)
            };
            await fetch(`/items/${editingId}`, {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(update)
            });
            closeEdit();
            loadInventory();
        }

        async function deleteItem(id) {
            if(!confirm("Erase this item?")) return;
            await fetch(`/items/${id}`, { method: 'DELETE' });
            loadInventory();
        }
    </script>
</body>
</html>
